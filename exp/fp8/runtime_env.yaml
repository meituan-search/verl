  HYDRA_FULL_ERROR: "1"
  VERL_LOGGING_LEVEL: "INFO"
  # WANDB_MODE: "offline"
  # WANDB_API_KEY: "c6a505ac97983529cf303349f68c7658350a2bb8"

  TORCH_CUDA_ARCH_LIST: "9.0"
  NVTE_FP8_BLOCK_SCALING_FP32_SCALES: "1"
  SGLANG_PATCH: "1"
  SGLANG_PORT: "30300"

  TENSORBOARD_DIR: "/mnt/dolphinfs/ssd_pool/docker/user/hadoop-friday-studio/FTI/houzhenggang/wangshulin02/tensorboard/fp8/test0"

  PYTHONPATH: "./third_party/Megatron-Bridge/src:./third_party/Megatron-LM:${PYTHONPATH}"

  # DeepGEMM JIT compilation cache directory (fix NVCC permission issue)
