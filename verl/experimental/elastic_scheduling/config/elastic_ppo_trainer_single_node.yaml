# Elastic Scheduling PPO Trainer Configuration for Single Node (8 GPUs)
# Resource allocation:
#   - Rollout: 4 GPUs (GPU 0-3)
#   - Train: 2 GPUs (GPU 4-5)
#   - Elastic: 2 GPUs (GPU 6-7), initial mode: rollout

# Elastic Scheduling Configuration
elastic_scheduling:
  # Resource allocation (number of GPUs per role)
  rollout_gpus: 4              # Fixed rollout GPUs
  train_gpus: 2                # Fixed training GPUs
  elastic_gpus: 2              # Elastic GPUs that can switch
  dp_size_per_resource: 1     # DP size per resource group (1 for simplicity)

  # Elastic resource initial mode
  elastic_initial_mode: rollout  # Options: rollout, train

  # Scheduling thresholds
  rollout_queue_high_watermark: 0.8   # Trigger rollout scale-up
  rollout_queue_low_watermark: 0.3    # Trigger train scale-up
  cooldown_seconds: 10.0             # Cooldown between switches

  # Sync settings
  sync_trigger_interval: 4     # Sync every N training steps
  enable_incremental_sync: true

  # Monitoring
  check_interval: 1.0         # Coordination loop interval (seconds)
  congestion_window_size: 20   # Sliding window for rate calculation

# Standard PPO Training Configuration
actor_rollout_ref:
  # Enable hybrid engine for dynamic resource switching
  hybrid_engine: false  # Disabled for elastic scheduling

  # Model configuration
  model:
    path: null
    use_remove_padding: true
    use_fused_kernels: true
    hf_config:
      architectures:
        - Qwen2ForCausalLM
      torch_dtype: bfloat16
      use_flash_attention_2: true

  # Actor configuration
  actor:
    config:
      strategy: fsdp2
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      use_dynamic_bsz: true
      ppo_max_token_len_per_gpu: 8192
      ppo_micro_batch_size_per_gpu: 2
    optim:
      lr: 1.0e-6
      weight_decay: 0.01
      clip_grad: 1.0
      type: adamw
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1.0e-8
    checkpoint:
      save_algorithm: generic
      checkpoint_type: ddp
      save_freq: -1
      load_format: fake

  # Rollout configuration
  rollout:
    name: vllm
    nnodes: 1
    n_gpus_per_node: 4  # Rollout uses 4 GPUs
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    data_parallel_size: -1
    data_parallel_size_rollout: -1
    log_prob_micro_batch_size_per_gpu: 2
    log_prob_use_dynamic_bsz: true
    log_prob_max_token_len_per_gpu: 8192
    max_model_len: 8192
    free_cache_engine: true
    gpu_memory_utilization: 0.6
    checkpoint_engine:
      backend: naive
      update_weights_bucket_megabytes: 1000
      engine_kwargs:
        naive: {}
        nixl: {}
        raycollective: {}
    profiler: null
    calculate_log_probs: true  # Required for async training

  # Reference model configuration
  ref:
    config:
      strategy: fsdp2
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
    checkpoint:
      save_algorithm: generic
      checkpoint_type: ddp
      save_freq: -1
      load_format: fake
    use_dynamic_bsz: true
    log_prob_micro_batch_size_per_gpu: 2
    log_prob_max_token_len_per_gpu: 8192

# Training Data Configuration
data:
  train_files: []
  val_files: []
  max_seq_len: 8192
  train_batch_size: 0  # Disabled for async
  gen_batch_size: 1   # Async mode
  val_batch_size: null
  num_workers: 8
  num_train_workers: 1
  num_val_workers: 1

# PPO Algorithm Configuration
algorithm:
  ppo:
    gradient_accumulation_steps: 1
    mini_batch_size: 512
    epochs: 1
    clip_ratio: 0.2
    clip_ratio_value: 0.2
    gamma: 1.0
    lam: 0.95
    adv_estimator: gae
    gae_tau: 1.0
    adaptive_clip: false
    adaptive_clip_ratio: 0.2
    use_rloo: false
    rloo_beta: 0.0
    kl_ctrl:
      type: fixed
      kl_coef: 0.0

# Async Training Configuration
async_training:
  staleness_threshold: 0.5
  trigger_parameter_sync_step: 4
  require_batches: 1
  partial_rollout: true

# Custom Loss Configuration
loss:
  entropy:
    coefficient: 0.0
    cache_per_sample: false
  mask:
    decoder_margin_loss_weight: 0.0
  mask_padding: true

# Reward Configuration
reward:
  reward_function: null
  reward_norm_by_device: false
  reward_scale: -1
  reward_shift: 0
  mixed_precision: false

# Wandb Configuration
wandb:
  project: verl_async
  experiment: elastic_ppo_single_node
  entity: null
  name: null
  resume: false
  notes: null
  tags: []
  log_interval: 1
  project_dir: null
  enable: false

# Checkpoint Configuration
checkpoint:
  save_freq: 10
  max_checkpoints_to_keep: 3
  save_per_n_iterations: 100
  checkpoint_dir: null

# Training Configuration
training:
  total_epochs: 100
  val_interval: 5
  save_freq: 10
  logging_interval: 1
  seed: null
  device: cuda
  test_freq: 10  # Validation frequency

# Rollout Worker Configuration
rollout:
  nnodes: 1
  n_gpus_per_node: 4  # Rollout uses 4 GPUs

# Trainer Configuration
trainer:
  nnodes: 1
  n_gpus_per_node: 2  # Train uses 2 GPUs
  logger: ['console']

