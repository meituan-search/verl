hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_trainer
  - _self_

async_training:

  # Maximum samples staleness threshold
  staleness_threshold: 0.1

  # Frequency of parameter synchronization between rollouter and trainer, 
  # One step means trainer obtains a batch of required samples
  trigger_parameter_sync_step: 4
  
  # The number of ppo_mini_batches that the FullyAsyncTrainer obtains once
  require_batches: 1

  # When synchronizing parameters, Whether to resume generation when rollout is interrupted.
  # If True, LLMServerClient auto resume generation, making rollout interruption invisible to the AgentLoop.
  partial_rollout: True

  # whether to use trainer do_validate
  use_trainer_do_validate: False

  # Whether to enable dynamic resource scaling.
  # When True, hybrid rollout replicas are initialised on Trainer-node GPUs at
  # startup (sleeping, memory returned to the training engine), and are kept
  # active so that Trainer GPUs participate in rollout alongside standalone GPUs.
  # Override FullyAsyncTrainer._get_dynamic_scaling_target() in a subclass for
  # runtime-adaptive policies (e.g. based on queue depth or throughput ratio).
  use_dynamic_resource_scaling: False

  # Sample-collection ratio threshold for deactivating hybrid replicas.
  # At each fit_step, the controller computes:
  #   ratio = staleness_samples / required_samples
  # If ratio >= this threshold → enough samples collected → deactivate hybrid replicas
  #                                                         and return Trainer GPU to training.
  # If ratio <  this threshold → still collecting         → keep hybrid replicas active.
  # Default 1.0 means deactivate only once a full batch worth of samples has been collected.
  # Set lower (e.g. 0.8) to deactivate earlier and give the Trainer GPU more training time.
  dynamic_scaling_deactivate_ratio: 0.3

  # Maximum number of concurrent generation requests per replica.
  # Used to compute max_concurrent_samples = num_active_replicas * concurrent_samples_per_replica.
  # Increase for higher-memory replicas or longer sequences; decrease to reduce GPU memory pressure.
  concurrent_samples_per_replica: 16

# Rollout config
rollout:

  # Number of nodes used in the rollout
  nnodes: 1

  # Number of GPUs per node                     
  n_gpus_per_node: 8

  # number of responses (i.e. num sample times). > 1 for grpo
  n: 4

  # total rollout samples # TODO rename to total_rollout_samples
  total_rollout_steps: 100

data:
  # Number of samples generated, currently only support 1
  gen_batch_size: 1

actor_rollout_ref:

  rollout:
    # Must be enabled! Otherwise, log_probs cannot be calculated.
    calculate_log_probs: True

    # When use_dynamic_resource_scaling is enabled, hybrid replicas share the GPU with
    # the training engine, so gpu_memory_utilization should be kept low (e.g. 0.3-0.5).
    # standalone_gpu_memory_utilization applies only to standalone replicas (dedicated
    # rollout GPUs); null means fall back to gpu_memory_utilization.
    standalone_gpu_memory_utilization: null

    checkpoint_engine:
      backend: "nccl"

  actor:
    # Must use rollout log probs for training
    use_rollout_log_probs: True

  model:
    # To use remove padding (thd)
    use_remove_padding: True


# Only then will the use of log probs be correct.
# And it can be used in conjunction with other rollout_correction algorithms.
algorithm:
  rollout_correction:
    bypass_mode: True
